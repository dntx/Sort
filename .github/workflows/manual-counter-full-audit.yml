name: manual-counter-full-audit

on:
  workflow_dispatch:
    inputs:
      build_configuration:
        description: Build configuration for deterministic counter audit
        type: choice
        options:
          - Release
          - Debug
        default: Release
      matched_tests_baseline_path:
        description: Repository path to the matched-tests baseline file
        type: string
        default: .\\docs\\counter-guardrails-full-counter-suite-baseline.txt
      pull_request_number:
        description: Optional pull request number to receive/update a counter audit summary comment
        type: string
        default: ""
      list_only:
        description: If true, validate guardrail selector coverage and matched-test diff without running tests or snapshots
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write

jobs:
  counter-full-audit:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run counter full audit
        id: run_audit
        shell: pwsh
        run: |
          $listOnly = "${{ inputs.list_only }}"
          $listOnlyArg = if ($listOnly -eq "true") { "-ListOnly" } else { "" }
          $artifactsDir = Join-Path $env:RUNNER_TEMP "counter-full-audit"
          pwsh .\scripts\run-counter-full-audit.ps1 `
            -Configuration "${{ inputs.build_configuration }}" `
            -ArtifactsDir $artifactsDir `
            -MatchedTestsBaselinePath "${{ inputs.matched_tests_baseline_path }}" `
            $listOnlyArg
          "artifacts_dir=$artifactsDir" >> $env:GITHUB_OUTPUT
          "summary_json_path=$(Join-Path $artifactsDir 'counter-full-audit-summary.json')" >> $env:GITHUB_OUTPUT
          "summary_md_path=$(Join-Path $artifactsDir 'counter-full-audit-summary.md')" >> $env:GITHUB_OUTPUT

      - name: Upload counter full audit summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: counter-full-audit-summary
          path: |
            ${{ steps.run_audit.outputs.summary_json_path }}
            ${{ steps.run_audit.outputs.summary_md_path }}

      - name: Upload counter full audit bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: counter-full-audit-bundle
          path: ${{ steps.run_audit.outputs.artifacts_dir }}

      - name: Append audit summary to workflow summary
        if: always()
        shell: pwsh
        run: |
          Get-Content "${{ steps.run_audit.outputs.summary_md_path }}" | Add-Content $env:GITHUB_STEP_SUMMARY
          $diffPath = Join-Path "${{ steps.run_audit.outputs.artifacts_dir }}" "counter-guardrails-matched-tests-diff.md"
          if (Test-Path $diffPath) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "`r`n---`r`n"
            Get-Content $diffPath | Add-Content $env:GITHUB_STEP_SUMMARY
          }

      - name: Comment audit summary on pull request
        if: ${{ always() && inputs.pull_request_number != '' }}
        uses: actions/github-script@v7
        env:
          SUMMARY_MD_PATH: ${{ steps.run_audit.outputs.summary_md_path }}
          DIFF_MD_PATH: ${{ steps.run_audit.outputs.artifacts_dir }}/counter-guardrails-matched-tests-diff.md
          PR_NUMBER: ${{ inputs.pull_request_number }}
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- counter-full-audit-comment -->';
            const issueNumber = Number(process.env.PR_NUMBER);
            const summary = fs.readFileSync(process.env.SUMMARY_MD_PATH, 'utf8');
            const diff = fs.existsSync(process.env.DIFF_MD_PATH)
              ? fs.readFileSync(process.env.DIFF_MD_PATH, 'utf8')
              : '';
            const body = [
              marker,
              '## Counter Full Audit',
              '',
              summary,
              diff ? '\n---\n' + diff : ''
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 100,
            });

            const existing = comments.find(comment =>
              typeof comment.body === 'string' && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body,
              });
            }
