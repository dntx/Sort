name: manual-counter-guardrails

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Counter guardrail profile to run
        type: choice
        options:
          - fast-default
          - iterative-frontier
          - compact
          - full-counter-suite
        default: fast-default
      build_configuration:
        description: Build configuration for deterministic counter runs
        type: choice
        options:
          - Release
          - Debug
        default: Release
      list_only:
        description: If true, validate selectors and preflight matching without executing tests
        type: boolean
        default: false
      collect_snapshots:
        description: If true, run unified counter snapshot collection and upload summary artifacts
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  counter-guardrails:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run deterministic counter-cap guardrails
        id: run_guardrails
        shell: pwsh
        run: |
          $listOnly = "${{ inputs.list_only }}"
          $listOnlyArg = if ($listOnly -eq "true") { "-ListOnly" } else { "" }
          $summaryPath = Join-Path $env:RUNNER_TEMP "counter-guardrails-summary.json"
          pwsh .\scripts\run-counter-guardrails.ps1 -Profile "${{ inputs.profile }}" -Configuration "${{ inputs.build_configuration }}" -SummaryJsonPath $summaryPath $listOnlyArg
          "summary_path=$summaryPath" >> $env:GITHUB_OUTPUT

      - name: Collect deterministic counter snapshots
        if: ${{ inputs.collect_snapshots && !inputs.list_only }}
        id: collect_snapshots
        shell: pwsh
        run: |
          $artifactsDir = Join-Path $env:RUNNER_TEMP "counter-snapshot-artifacts"
          pwsh .\scripts\collect-all-counter-snapshots.ps1 -Configuration "${{ inputs.build_configuration }}" -ArtifactsDir $artifactsDir
          $summaryJsonPath = Join-Path $artifactsDir "counter-snapshot-summary.json"
          $summaryMdPath = Join-Path $artifactsDir "counter-snapshot-summary.md"
          "artifacts_dir=$artifactsDir" >> $env:GITHUB_OUTPUT
          "summary_json_path=$summaryJsonPath" >> $env:GITHUB_OUTPUT
          "summary_md_path=$summaryMdPath" >> $env:GITHUB_OUTPUT

      - name: Upload counter guardrail summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: counter-guardrails-summary
          path: ${{ steps.run_guardrails.outputs.summary_path }}

      - name: Upload counter snapshot summary
        if: ${{ always() && inputs.collect_snapshots && !inputs.list_only }}
        uses: actions/upload-artifact@v4
        with:
          name: counter-snapshot-summary
          path: |
            ${{ steps.collect_snapshots.outputs.summary_json_path }}
            ${{ steps.collect_snapshots.outputs.summary_md_path }}

      - name: Upload counter snapshot detail rows
        if: ${{ always() && inputs.collect_snapshots && !inputs.list_only }}
        uses: actions/upload-artifact@v4
        with:
          name: counter-snapshot-rows
          path: ${{ steps.collect_snapshots.outputs.artifacts_dir }}/snapshots
