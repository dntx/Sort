name: ai-code-review

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true

permissions:
  contents: read
  pull-requests: write
  models: read

concurrency:
  group: ai-code-review-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run AI code review
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          # Comma-separated fallback chain. Each model has its own GitHub Models
          # quota, so the reviewer rotates to the next one on HTTP 429. The most
          # capable (high rate-limit tier) models are tried first for review
          # quality; lower-tier mini models act as higher-quota overflow.
          REVIEW_MODELS: openai/gpt-4.1,openai/gpt-4o,openai/gpt-4.1-mini,openai/gpt-4o-mini
        run: python .github/scripts/ai_review.py
