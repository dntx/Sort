name: manual-perf-gate

on:
  workflow_dispatch:
    inputs:
      warmup_runs:
        description: Warmup runs for benchmark script
        type: number
        default: 1
      measured_runs:
        description: Measured runs for benchmark script
        type: number
        default: 5
      regression_tolerance_percent:
        description: Allowed median slowdown percent vs baseline
        type: number
        default: 5
      list_only:
        description: If true, print resolved command and exit without running benchmark
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  perf-gate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run greedy stage-1 baseline gate
        id: run_perf_gate
        shell: pwsh
        run: |
          $listOnly = "${{ inputs.list_only }}"
          $listOnlyArg = if ($listOnly -eq "true") { "-ListOnly" } else { "" }
          $summaryPath = Join-Path $env:RUNNER_TEMP "perf-gate-summary.json"
          pwsh .\scripts\run-perf-gate.ps1 `
            -WarmupRuns ${{ inputs.warmup_runs }} `
            -MeasuredRuns ${{ inputs.measured_runs }} `
            -RegressionTolerancePercent ${{ inputs.regression_tolerance_percent }} `
            -EnforceBaseline `
            -SummaryJsonPath $summaryPath `
            $listOnlyArg
          "summary_path=$summaryPath" >> $env:GITHUB_OUTPUT

      - name: Upload perf gate summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-gate-summary
          path: ${{ steps.run_perf_gate.outputs.summary_path }}
